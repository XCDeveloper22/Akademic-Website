<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for advanced styling gradients -->
  <defs>
    <!-- Background Shield Gradient: Rich Crimson to Deep Burgundy -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab2323" />
      <stop offset="50%" stop-color="#801414" />
      <stop offset="100%" stop-color="#4f0808" />
    </linearGradient>

    <!-- Border & Accents Gradient: Royal Gold to Light Champagne -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a67c1e" />
      <stop offset="30%" stop-color="#cca038" />
      <stop offset="70%" stop-color="#ffd573" />
      <stop offset="100%" stop-color="#cca038" />
    </linearGradient>

    <!-- Inner Glow Gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4" />
    </radialGradient>
  </defs>

  <!-- External Drop Shadow and Outer Glow -->
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
  </filter>

  <!-- Classic Academic Shield Path -->
  <g filter="url(#shadow)">
    <!-- Shield Outer Gold Border -->
    <path d="M 256,32 
             C 380,32 440,70 440,200 
             C 440,340 340,430 256,480 
             C 172,430 72,340 72,200 
             C 72,70 132,32 256,32 Z" 
          fill="url(#goldGrad)" />

    <!-- Shield Inner Crimson Inset -->
    <path d="M 256,46 
             C 365,46 418,80 418,200 
             C 418,325 328,408 256,454 
             C 184,408 94,325 94,200 
             C 94,80 147,46 256,46 Z" 
          fill="url(#shieldGrad)" />

    <!-- Radial Glow over the Crimson background -->
    <path d="M 256,46 
             C 365,46 418,80 418,200 
             C 418,325 328,408 256,454 
             C 184,408 94,325 94,200 
             C 94,80 147,46 256,46 Z" 
          fill="url(#innerGlow)" />
  </g>

  <!-- Main "A" Emblem Design in Gold -->
  <g transform="translate(0, 15)">
    <!-- Stylized Academic "A" -->
    <path d="M 256,120 
             L 155,340 
             H 205 
             L 228,290 
             H 284 
             L 307,340 
             H 357 
             Z 
             M 256,230 
             L 241,262 
             H 271 
             Z" 
          fill="url(#goldGrad)" />

    <!-- Elegant Traditional Academic Graduation Cap sitting on top of the A -->
    <g transform="translate(0, -5)">
      <!-- Cap Diamond/Board -->
      <polygon points="256,90 320,115 256,140 192,115" fill="url(#goldGrad)" stroke="#4f0808" stroke-width="2" />
      <polygon points="256,95 310,115 256,135 202,115" fill="#4f0808" />
      <!-- Cap Base skullcap -->
      <path d="M 224,127 C 224,136 288,136 288,127 L 288,120 L 224,120 Z" fill="url(#goldGrad)" />
      <!-- Cap Tassel -->
      <path d="M 256,115 L 305,123 L 308,145" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
      <circle cx="308" cy="147" r="4.5" fill="url(#goldGrad)" />
    </g>
  </g>

  <!-- Elegant university star accents -->
  <g fill="url(#goldGrad)">
    <polygon points="160,170 164,178 172,180 166,186 168,194 160,190 152,194 154,186 148,180 156,178" />
    <polygon points="352,170 356,178 364,180 358,186 360,194 352,190 344,194 346,186 340,180 348,178" />
    <polygon points="256,405 260,413 268,415 262,421 264,429 256,425 248,429 250,421 244,415 252,413" />
  </g>
</svg>
